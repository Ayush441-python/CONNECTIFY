name: Deploy

# Render and Vercel both auto-deploy from GitHub natively once connected — you likely don't
# need this file at all. It's here for the less common case where you want deploys gated
# behind CI passing first, using each platform's "Deploy Hook" URL (Render: Settings ->
# Deploy Hook. Vercel: usually unnecessary, its GitHub integration already does this).
#
# Add the secret(s) below in GitHub -> Settings -> Secrets and variables -> Actions.
# Any hook that isn't configured is skipped rather than failing the run.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        if: ${{ vars.RENDER_DEPLOY_HOOK_URL != '' || secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Trigger Vercel deploy hook
        if: ${{ vars.VERCEL_DEPLOY_HOOK_URL != '' || secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
