name: connectify

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: connectify
      POSTGRES_PASSWORD: connectify
      POSTGRES_DB: connectify
    ports:
      - '5432:5432'
    volumes:
      - connectify_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U connectify']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://connectify:connectify@postgres:5432/connectify
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 30
      CORS_ORIGIN: http://localhost:5173
      CLIENT_URL: http://localhost:5173
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      ADMIN_EMAIL: admin@connectify.app
      ADMIN_PASSWORD: ChangeMe123!
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  connectify_postgres_data:
